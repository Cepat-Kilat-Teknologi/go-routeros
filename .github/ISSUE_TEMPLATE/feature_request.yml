name: Feature Request
description: Suggest a new feature for go-routeros
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this feature relate to?
      options:
        - rest (REST API)
        - api (API Protocol)
        - api/proto (Wire Protocol)
        - New package
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include code examples if possible.
      render: go

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?
