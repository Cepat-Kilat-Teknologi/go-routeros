version: "2"

run:
  timeout: 5m
  go: "1.21"

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - example

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - revive
  exclusions:
    paths:
      - example
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive
      - text: "routeros"
        linters:
          - misspell

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
  misspell:
    locale: US
  gocritic:
    enabled-tags:
      - diagnostic
      - style
